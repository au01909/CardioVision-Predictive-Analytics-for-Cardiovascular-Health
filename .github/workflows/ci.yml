name: CardioVision CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-train-evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Unit tests (pre-training)
        run: pytest tests/test_preprocessing.py -v

      - name: Train model
        run: python train.py

      - name: Evaluate model
        run: python evaluate.py

      - name: Full test suite (post-training)
        run: pytest tests/ -v

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cardiovision-model
          path: |
            models/
            artifacts/

      - name: Upload MLflow database
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-tracking-db
          path: mlflow.db

  build-documentation:
    needs: build-train-evaluate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download evaluation artifacts
        uses: actions/download-artifact@v4
        with:
          name: cardiovision-model

      - name: Build docs site
        run: |
          mkdir -p _site
          cp -r docs/* _site/ 2>/dev/null || true
          cp -r artifacts _site/artifacts
          cp README.md _site/README.md

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
